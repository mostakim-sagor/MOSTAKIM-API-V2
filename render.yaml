services:
  - type: web
    name: mostakim-api
    env: node
    plan: free
    buildCommand: cd api && npm install
    startCommand: cd api && node src/mostakim.js
    envVars:
      - key: API_URL
        sync: false
      - key: API_PORT
        value: "10000"
      - key: CORS_WILDCARD
        value: "1"

  - type: web
    name: mostakim-web
    env: static
    buildCommand: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds && cd web && pnpm build
    staticPublishPath: ./web/build
    envVars:
      - key: WEB_DEFAULT_API
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
